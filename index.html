<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Regex Tester</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      padding: 3rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 2rem;
      width: 100%;
      max-width: 600px;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 1.5rem;
      color: #222;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 0.35rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      font-family: monospace;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #4f7ef8;
    }

    button {
      width: 100%;
      padding: 0.65rem;
      background: #4f7ef8;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #3a66d6; }
    button:disabled { background: #aac0fb; cursor: not-allowed; }

    #result {
      margin-top: 1.5rem;
      display: none;
    }

    #result h2 {
      font-size: 0.9rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 0.5rem;
    }

    #result pre {
      background: #f0f4ff;
      border: 1px solid #d0dbff;
      border-radius: 6px;
      padding: 1rem;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
      color: #222;
    }

    #result.error pre {
      background: #fff0f0;
      border-color: #ffd0d0;
      color: #c0392b;
    }

    #graph {
      margin-top: 1.5rem;
      display: none;
      overflow-x: auto;
    }

    #graph h2 {
      font-size: 0.9rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 0.5rem;
    }

    #graph svg {
      max-width: 100%;
      height: auto;
      display: block;
    }

    #trace {
      margin-top: 1.5rem;
      display: none;
    }

    #trace-result {
      font-size: 0.9rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 0.6rem;
    }

    #trace-controls {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    #trace-controls button {
      width: auto;
      padding: 0.3rem 0.65rem;
      font-size: 1rem;
      background: #4f7ef8;
    }

    #trace-controls button:disabled {
      background: #aac0fb;
    }

    #trace-pos {
      font-size: 0.85rem;
      color: #555;
      min-width: 5rem;
      text-align: center;
    }

    #input-state {
      display: flex;
      gap: 1.5rem;
      font-family: monospace;
      font-size: 0.82rem;
      color: #666;
      margin-bottom: 0.6rem;
    }

    #input-state .is-char { color: #4f7ef8; font-weight: 700; }
    #input-state .is-rest { color: #999; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@viz-js/viz@3/lib/viz-standalone.js"></script>
</head>
<body>
  <div class="card">
    <h1>Regex Tester</h1>

    <label for="regexp">Regular Expression</label>
    <input type="text" id="regexp" placeholder="e.g. \d+" />

    <label for="input">Input String</label>
    <input type="text" id="input" placeholder="e.g. hello 42 world" />

    <button id="submit-btn" onclick="submitRequest()">Test</button>

    <div id="result">
      <h2>Result</h2>
      <pre id="result-body"></pre>
    </div>

    <br>
    <div id="trace-result"></div>
    <div id="graph">
      <div id="input-state"></div>
      <div id="graph-body"></div>
    </div>

    <div id="trace">
      <div id="trace-controls">
        <button onclick="traceGo(0)" title="First">&#171;</button>
        <button onclick="traceStep(-1)" title="Previous">&#8249;</button>
        <span id="trace-pos"></span>
        <button onclick="traceStep(1)" title="Next">&#8250;</button>
        <button onclick="traceGo(traceData.length - 1)" title="Last">&#187;</button>
      </div>
    </div>
  </div>

  <script>
    let vizInstance = null;
    let graphvizSrc = null;
    let traceData   = null;
    let traceIdx    = 0;
    let inputStr    = '';

    Viz.instance().then(v => { vizInstance = v; });

    // Build a coloured copy of the graphviz source for a single trace step.
    // The source must contain exactly one '//COLORS' marker; we inject the
    // colour attribute for the targeted node immediately after it.
    function buildColoredGraphviz(gv, traceItem) {
      const [node, matched] = traceItem;
      const color = matched ? 'blue' : 'red';
      const parts = gv.split('//COLORS');
      return parts[0] + `//COLORS\nS${node} [color=${color},style=filled]\n` + parts[1];
    }

    function renderTraceStep(idx) {
      traceIdx = idx;
      const gv = buildColoredGraphviz(graphvizSrc, traceData[idx]);

      const graphBodyEl = document.getElementById('graph-body');
      graphBodyEl.innerHTML = '';
      graphBodyEl.appendChild(vizInstance.renderSVGElement(gv));

      document.getElementById('trace-pos').textContent =
        `step ${idx + 1} / ${traceData.length}`;

      // current char = input[i-1] for step i; remaining = input.slice(i)
      const cur  = idx > 0 ? `'${inputStr[idx - 1]}'` : '—';
      const rest = inputStr.slice(idx);
      document.getElementById('input-state').innerHTML =
        `<span>char: <span class="is-char">${cur}</span></span>` +
        `<span>remaining: <span class="is-rest">"${rest}"</span></span>`;
    }

    function traceStep(delta) {
      const next = traceIdx + delta;
      if (next >= 0 && next < traceData.length) renderTraceStep(next);
    }

    function traceGo(idx) {
      renderTraceStep(Math.max(0, Math.min(idx, traceData.length - 1)));
    }

    async function submitRequest() {
      const regexp = document.getElementById('regexp').value;
      const input  = document.getElementById('input').value;
      const btn    = document.getElementById('submit-btn');
      const resultEl  = document.getElementById('result');
      const bodyEl    = document.getElementById('result-body');
      const graphEl   = document.getElementById('graph');
      const traceEl   = document.getElementById('trace');

      inputStr = input;
      btn.disabled = true;
      resultEl.style.display = 'none';
      resultEl.classList.remove('error');
      graphEl.style.display = 'none';
      traceEl.style.display = 'none';
      graphvizSrc = null;
      traceData   = null;

      try {
        const response = await fetch('http://localhost:8080', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ regexp, input }),
        });

        const text = await response.text();
        let display;
        try {
          display = JSON.stringify(JSON.parse(text), null, 2);
        } catch {
          display = text;
        }

        if (!response.ok) {
          resultEl.classList.add('error');
          bodyEl.textContent = `HTTP ${response.status} ${response.statusText}\n\n${display}`;
        } else {
          bodyEl.textContent = display;

          let parsed;
          try { parsed = JSON.parse(text); } catch { parsed = null; }

          if (parsed && parsed.graphviz) {
            graphvizSrc = parsed.graphviz;

            if (parsed.trace && parsed.trace.length > 0) {
              traceData = parsed.trace;
              traceIdx  = 0;

              // Show result badge
              const matchLabel = parsed.matched != null
                ? String(parsed.matched) === "false" ? "Rejected" : "Accepted"
                : 'Unknown';
              document.getElementById('trace-result').textContent =
                `Result: ${matchLabel}`;

              traceEl.style.display = 'block';
              graphEl.style.display = 'block';
              renderTraceStep(0);
            } else {
              document.getElementById('graph-body').innerHTML = '';
              document.getElementById('graph-body')
                .appendChild(vizInstance.renderSVGElement(graphvizSrc));
              graphEl.style.display = 'block';
            }
          }
        }
      } catch (err) {
        resultEl.classList.add('error');
        bodyEl.textContent = `Request failed: ${err.message}`;
      }

      resultEl.style.display = 'block';
      btn.disabled = false;
    }

    // Allow Enter key to submit from either field
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitRequest();
    });
  </script>
</body>
</html>
